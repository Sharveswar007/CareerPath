name: Ping Database to Prevent Sleep

on:
  schedule:
    # Runs every Monday, Wednesday, and Friday at midnight UTC
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase to keep the project active..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/auth/v1/health")
          
          # 200 is success. 
          if [ "$response" -eq 200 ]; then
            echo "Ping successful! Status code: $response"
          else
            echo "Ping failed. Status code: $response"
            echo "Error response from Supabase:"
            curl -s \
              -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
              "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/auth/v1/health"
            exit 1
          fi
